<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 272 44" width="272" height="44">
  <defs>
    <linearGradient id="logo-data" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a6cf5"/>
      <stop offset="100%" stop-color="#5b9cf6"/>
    </linearGradient>
    <linearGradient id="logo-dev" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f07040"/>
      <stop offset="100%" stop-color="#f09070"/>
    </linearGradient>
  </defs>

  <!-- K mark container -->
  <rect x="1" y="1" width="40" height="40" rx="10" fill="#0d0d0d"/>
  <rect x="1" y="1" width="40" height="40" rx="10" fill="none" stroke="rgba(240,237,230,0.12)" stroke-width="1"/>
  <!-- inner gloss -->
  <rect x="1" y="1" width="40" height="20" rx="10" fill="rgba(255,255,255,0.03)"/>

  <!-- K vertical stroke -->
  <line x1="13" y1="10" x2="13" y2="32" stroke="#f0ede6" stroke-width="3.5" stroke-linecap="round"/>
  <!-- K top arm — data blue -->
  <line x1="13" y1="21" x2="31" y2="10" stroke="url(#logo-data)" stroke-width="3" stroke-linecap="round"/>
  <!-- K bottom arm — dev orange -->
  <line x1="13" y1="21" x2="31" y2="32" stroke="url(#logo-dev)"  stroke-width="3" stroke-linecap="round"/>

  <!-- KOLAWOLES wordmark -->
  <text
    x="52" y="27"
    font-family="'Syne', system-ui, sans-serif"
    font-weight="800"
    font-size="18"
    fill="#f0ede6"
    letter-spacing="0.07em"
  >KOLAWOLES</text>
</svg>
