<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="data" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a6cf5"/>
      <stop offset="100%" stop-color="#5b9cf6"/>
    </linearGradient>
    <linearGradient id="dev" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f07040"/>
      <stop offset="100%" stop-color="#f09070"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="32" height="32" rx="7" fill="#080808"/>
  <rect width="32" height="32" rx="7" fill="none" stroke="rgba(240,237,230,0.14)" stroke-width="0.75"/>

  <!-- K vertical stroke -->
  <line x1="10" y1="6" x2="10" y2="26" stroke="#f0ede6" stroke-width="3.5" stroke-linecap="round"/>
  <!-- K top arm — data blue -->
  <line x1="10" y1="16" x2="24" y2="6"  stroke="url(#data)" stroke-width="3" stroke-linecap="round"/>
  <!-- K bottom arm — dev orange -->
  <line x1="10" y1="16" x2="24" y2="26" stroke="url(#dev)"  stroke-width="3" stroke-linecap="round"/>
</svg>
